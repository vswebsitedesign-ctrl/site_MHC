name: Build and Deploy
on:
  push:
    branches: [ main ]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build site
        run: python3 build.py
      - name: Deploy to Plesk via rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          rsync -avz --delete --include="send.php" --exclude="*" \
            -e "ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no" \
            build/ mikes-house-clearance_wvlupgekl3@217.154.33.12:/var/www/vhosts/mikes-house-clearance.co.uk/httpdocs/
          rm /tmp/deploy_key
