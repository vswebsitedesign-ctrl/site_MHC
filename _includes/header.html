<header class="site-header" role="banner">
  <div class="header-inner">
    <a href="{{ '/' | relative_url }}" class="site-logo" aria-label="{{ site.title }} — return to homepage">
      {{ site.title }}
    </a>
    <button class="nav-toggle" aria-controls="primary-nav" aria-expanded="false" aria-label="Open navigation menu">
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
      <span class="nav-toggle-bar"></span>
    </button>
    <nav id="primary-nav" class="primary-nav" aria-label="Primary navigation">
      <ul role="list">
        {% for item in site.data.nav %}
        <li>
          <a href="{{ item.url | relative_url }}"
             {% if page.url == item.url %}aria-current="page"{% endif %}>
            {{ item.label }}
          </a>
        </li>
        {% endfor %}
      </ul>
    </nav>
    <a href="tel:{{ site.phone }}" class="header-cta" aria-label="Ring Mike on {{ site.phone }}">
      <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M20 15.5c-1.2 0-2.4-.2-3.6-.6-.3-.1-.7 0-1 .2l-2.2 2.2c-2.8-1.4-5.1-3.8-6.6-6.6l2.2-2.2c.3-.3.4-.7.2-1-.3-1.1-.5-2.3-.5-3.5 0-.6-.4-1-1-1H4c-.6 0-1 .4-1 1 0 9.4 7.6 17 17 17 .6 0 1-.4 1-1v-3.5c0-.6-.4-1-1-1z"/></svg>
      {{ site.phone }}
    </a>
  </div>
</header>
